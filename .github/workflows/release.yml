name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        default: "v0.1.0"

jobs:
  build-and-release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ github.event.inputs.version }}"
          else
            RAW_VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION="${RAW_VERSION#v}"
          echo "raw=${RAW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        run: |
          chmod +x scripts/build_app.sh scripts/package_release.sh
          APP_BUILD="${GITHUB_RUN_NUMBER}" zsh scripts/package_release.sh "${{ steps.version.outputs.version }}"

      - name: Upload GitHub Release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.raw }}
          generate_release_notes: true
          files: |
            dist/NvidiaBar-${{ steps.version.outputs.version }}.zip
