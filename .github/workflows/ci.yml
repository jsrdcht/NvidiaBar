name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  typecheck-and-package:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Typecheck sources
        run: |
          SDK_PATH="$(xcrun --sdk macosx --show-sdk-path)"
          swiftc -typecheck -sdk "$SDK_PATH" $(find Sources/NvidiaBar -name '*.swift' | sort)

      - name: Build app bundle
        run: |
          chmod +x scripts/build_app.sh
          zsh scripts/build_app.sh
